name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs so a moved tag can never
      # change what runs here (supply-chain hygiene); the comment keeps the
      # human-readable version.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      # Dev dependencies come from the hash-pinned lock file (regenerate with
      # `uv pip compile pyproject.toml --extra dev --universal
      # --generate-hashes --python-version 3.10 -o requirements-dev.txt`), and
      # the editable install reuses the hash-pinned build backend without
      # isolation, so no job resolves the open `.[dev]` ranges.
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Run tests
        run: pytest

  root-container-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Run tests as root with root basetemp
        run: sudo env "PATH=$PATH" PYTHONPATH=src python -m pytest -q --basetemp=/root/ephemdir-pytest
