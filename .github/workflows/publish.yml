name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) -- no API token needed.
# Configure the trusted publisher once at:
#   https://pypi.org/manage/project/ephemdir/settings/publishing/

on:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Run tests
        run: pytest

  root-container-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps --no-build-isolation
      - name: Run tests as root with root basetemp
        run: sudo env "PATH=$PATH" PYTHONPATH=src python -m pytest -q --basetemp=/root/ephemdir-pytest

  build:
    needs: [lint, test, root-container-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Actions are pinned to commit SHAs (see ci.yml for the rationale).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match project version {version!r}")
          PY
      - name: Build and smoke-test distributions
        # Hash-pinned toolchain + --no-isolation: the exact build backend is
        # the one from requirements-build.txt, not whatever the resolver
        # picks for `requires = ["setuptools>=78.1.1"]` in an isolated env.
        run: |
          python -m pip install --require-hashes -r requirements-build.txt
          python -m build --no-isolation
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          hashes = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in sorted(Path("dist").iterdir())
              if path.is_file()
          }
          if not hashes:
              raise SystemExit("no distribution artifacts were built")
          Path("dist.sha256.json").write_text(json.dumps(hashes, indent=2, sort_keys=True))
          PY
          python -m pip install --no-deps --force-reinstall dist/*.whl
          python -m ephemdir --version
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          expected = json.loads(Path("dist.sha256.json").read_text())
          actual = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in sorted(Path("dist").iterdir())
              if path.is_file()
          }
          if actual != expected:
              raise SystemExit("distribution artifacts changed during smoke test")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
